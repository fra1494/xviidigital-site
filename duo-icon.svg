<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="XVII Digital logo">
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6d36d"/>
      <stop offset="0.45" stop-color="#fff1bd"/>
      <stop offset="0.7" stop-color="#c8942d"/>
      <stop offset="1" stop-color="#f2c95b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="520" fill="none"/>
  <text x="450" y="285" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="190" font-weight="500" letter-spacing="12" fill="url(#gold)" filter="url(#glow)">XVII</text>
  <line x1="252" y1="348" x2="325" y2="348" stroke="url(#gold)" stroke-width="3" opacity=".85"/>
  <text x="450" y="372" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" letter-spacing="30" fill="url(#gold)">DIGITAL</text>
  <line x1="575" y1="348" x2="648" y2="348" stroke="url(#gold)" stroke-width="3" opacity=".85"/>
</svg>
